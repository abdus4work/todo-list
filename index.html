<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <link rel="shortcut icon" href="./todoimg.png" type="image/x-icon">
    <title>Todo List</title>
</head>
<body>
    <div class="container">
        
        <div class="todo">
            <h2>Todo-List <img src="./todoimg.png" alt="todo img"> </h2>

            <div class="row">
                <input type="text" name="" id="input-box" placeholder="Add Task Here">
                <button id="addBtn" onclick="addTask()">Add</button>
            </div>
            
            <div class="">
                <div id="status">
                    <h3 id="all" class="active">All Task</h3>
                    <h3 id="compTask">Complete Task</h3>
                    <h3 id="incompTask">Incomplete Task</h3>
                </div>
                <ul id="listContainer">
                </ul>
            </div>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
